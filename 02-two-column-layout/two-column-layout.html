<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizontal Card Layout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../all.css" />
  </head>
  <body>
    <main class="container p-5">
      <ul class="row list-unstyled">
        <li class="col">
          <div class="py-16p75 px-9p125 secondary-yellow-bg">
            <div class="mb-6">
              <img
                class="mx-auto"
                src="../img/2.雙欄排版/logo.png"
                alt="品來標誌"
              />
            </div>
            <h1 class="text-center primary-green display-5 fw-semibold lh-1p2">
              Sweetaste*
            </h1>
          </div>
        </li>
        <li class="col d-flex">
          <div
            class="secondary-yellow-bg px-1p625 d-flex flex-column justify-content-center"
          >
            <div class="mb-6">
              <h2 class="primary-green fs-3 fw-semibold lh-1p2">
                為什麼選擇了做甜點？
              </h2>
            </div>
            <div class="mb-6">
              <p class="fs-4">
                青山依舊在，幾度夕陽紅。<br />慣看秋月春風。一壺酌酒喜相逢，<br />
                浪花淘盡英雄。是非成敗轉頭空， <br />
                滾滾長江東逝水，白髮漁樵江渚上，<br />
                古今多少事，都付笑談中。
              </p>
            </div>
            <div class="mb-6">
              <p class="fs-4">
                是非成敗轉頭空，青山依舊在，幾度夕陽紅。<br />
                白髮漁樵江渚上，古今多少事，都付笑談中。。
              </p>
            </div>
            <p class="primary-green fs-4 fw-semibold lh-1p6">
              —— 想吃甜點 是不需要理由的。
            </p>
          </div>
        </li>
      </ul>
    </main>
  </body>
</html>
