<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizontal Card Layout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../all.css" />
  </head>
  <body>
    <main class="container p-5">
      <div class="d-flex justify-content-center">
        <!-- 選單 -->
        <ul
          class="list-unstyled secondary-yellow-bg px-0p75 pt-7 primary-green"
        >
          <li class="mb-3">
            <h1>
              <a class="primary-green" href="#"
                ><img
                  class="mx-auto"
                  src="../img/3.雙欄選單設計/logo.png"
                  alt="品牌標誌"
              /></a>
            </h1>
          </li>
          <li class="mb-3 py-p375">
            <a class="primary-green fs-4 text-center" href="＃">回到首頁</a>
          </li>
          <li class="mb-3 py-p375">
            <a class="primary-green fs-4 text-center" href="＃">關於我們</a>
          </li>
          <li class="mb-3 py-p375">
            <a class="primary-green fs-4 text-center" href="＃">熱銷產品</a>
          </li>
          <li class="py-p375">
            <a class="primary-green fs-4 text-center" href="＃">購物車</a>
          </li>
        </ul>
        <!-- 選單內容 -->
        <div class="pt-7 pb-p75 px-5p25 max-width-48p5">
          <!-- 標題 -->
          <div class="mb-3">
            <h2 class="primary-green fs-3 lh-1p2">集使濟業看</h2>
          </div>
          <!-- 內容 -->
          <div class="mb-3">
            <div class="mb-3">
              <p class="fs-4">
                麼時接發……分童阿卻在我，開似電停，我裡道的園水能金進以生參來題；毒業過立是哥：著要著久電受不身通比大！細不最時麼或公能因人外毒下生濟文政取業銷，也化投題已斷了勢地說在影家長親有得度了下成有統位你我育對此；量滿業明經：非位結是始大進，成花人上風分從否農。了大食大有石坐手，過更實的說！
              </p>
            </div>
            <br />
            <p class="fs-4">
              第全葉值不地要一際開為，濟職死的輕而知！孩來護屋維國以黃，最有都食明般在其怎康是人，活家
              聞在建格不清體是心土壞頭不爾爸斷以情出不。
            </p>
          </div>
          <!-- 圖片 -->
          <ul class="list-unstyled d-flex flex-wrap gap-2">
            <li><img src="../img/3.雙欄選單設計/pic.png" alt="圖片" /></li>
            <li><img src="../img/3.雙欄選單設計/pic.png" alt="圖片" /></li>
            <li><img src="../img/3.雙欄選單設計/pic.png" alt="圖片" /></li>
            <li><img src="../img/3.雙欄選單設計/pic.png" alt="圖片" /></li>
            <li><img src="../img/3.雙欄選單設計/pic.png" alt="圖片" /></li>
            <li><img src="../img/3.雙欄選單設計/pic.png" alt="圖片" /></li>
          </ul>
        </div>
      </div>
    </main>
  </body>
</html>
