<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizontal Card Layout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../all.css" />
  </head>
  <body>
    <header
      class="py-3 px-5 secondary-yellow-bg d-flex justify-content-between align-items-center"
    >
      <img
        src="../img/4.表頭表尾設計/logo.png"
        alt="品牌標誌"
        title="品牌標誌"
      />
      <nav>
        <ul class="list-unstyled d-flex">
          <li>
            <a class="primary-green me-p75 fs-7 fw-semibold" href="">Home</a>
          </li>
          <li>
            <a class="primary-green me-p75 fs-7 fw-semibold" href="">About</a>
          </li>
          <li>
            <a class="primary-green me-p75 fs-7 fw-semibold" href="">Product</a>
          </li>
          <li>
            <a class="primary-green fs-7 fw-semibold" href="">Contact</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="py-5">
      <section class="container max-width-38">
        <div class="mb-3">
          <h2 class="fs-7 primary-green fw-semibold">水文但知高</h2>
        </div>
        <div>
          <div class="mb-1p25">
            <p>
              一營她著站。市推用活體圖達了慢園、科權陽。過別馬目西化一腦食時不原刻不！常小小、聽天治母集士……治情高謝張愛引，如還要我的止。
            </p>
          </div>
          <div class="mb-1p25">
            <img src="../img/4.表頭表尾設計/pic.png" alt="" />
          </div>
          <p>
            則做於看外今科商各成實物區了料根於陽要樹！信是出皮造底教當報真在過往片養坐所奇這天知使書企靜當計過看謝有非銷人於觀教常生說一害人日時聞投懷有好坐
          </p>
        </div>
      </section>
    </main>
    <footer class="py-3 primary-green-bg">
      <nav>
        <ul class="list-unstyled d-flex justify-content-center">
          <li>
            <a class="white me-p75 fs-7 fw-semibold" href="">Home</a>
          </li>
          <li>
            <a class="white me-p75 fs-7 fw-semibold" href="">About</a>
          </li>
          <li>
            <a class="white me-p75 fs-7 fw-semibold" href="">Product</a>
          </li>
          <li>
            <a class="white fs-7 fw-semibold" href="">Contact</a>
          </li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
